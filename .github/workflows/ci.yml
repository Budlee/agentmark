name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck (errors only)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck --severity=error setup/*.sh

      - name: gofmt
        run: |
          unformatted="$(gofmt -l tagger/go)"
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi

      - name: spellcheck (en-GB)
        run: npx --yes cspell --no-progress "**/*.md"

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tagger/go/go.sum

      - name: install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev make linux-tools-generic
          # The apt bpftool wrapper (/usr/sbin/bpftool) execs a per-kernel binary and
          # fails on the runner's kernel. The versioned binary from linux-tools-generic
          # works for `btf dump` / `gen skeleton` regardless of the running kernel, so
          # symlink it over the wrapper on PATH.
          bin="$(find /usr/lib/linux-tools*/ -name bpftool 2>/dev/null | head -1)"
          test -n "$bin" || { echo "no bpftool binary found"; exit 1; }
          sudo ln -sf "$bin" /usr/local/bin/bpftool
          hash -r
          bpftool version
          test -f /sys/kernel/btf/vmlinux   # CI runner must expose BTF for CO-RE

      - name: build C loader
        run: make -C tagger/c

      - name: build Go loader
        run: make go

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck (errors only)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck --severity=error setup/*.sh

      - name: gofmt
        run: |
          unformatted="$(gofmt -l tagger/go)"
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi

      - name: spellcheck (en-GB)
        run: npx --yes cspell --no-progress "**/*.md"

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev make linux-tools-generic
          command -v bpftool \
            || sudo ln -sf "$(find /usr/lib/linux-tools* -name bpftool | head -1)" /usr/local/bin/bpftool
          bpftool version
          test -f /sys/kernel/btf/vmlinux   # CI runner must expose BTF for CO-RE

      - name: build C loader
        run: make -C tagger/c

      - name: build Go loader
        run: make go

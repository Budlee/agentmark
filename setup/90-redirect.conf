# /etc/sysctl.d/90-agentmark.conf
# Kernel tunables for the transparent REDIRECT to the local mitmproxy.

# REDIRECT rewrites the destination to 127.0.0.1; by default the kernel drops
# packets routed to loopback that arrive via other paths ("martians"). Permit it.
net.ipv4.conf.all.route_localnet = 1
net.ipv4.conf.default.route_localnet = 1

# Don't emit ICMP redirects that could interfere with the local hijack.
net.ipv4.conf.all.send_redirects = 0

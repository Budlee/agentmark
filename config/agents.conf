# agents.conf — coding-agent binaries whose SUBPROCESSES get the `X-AI-Agent: TRUE`
# header on their outbound HTTP(S). The agent's own traffic is left untouched; only
# the tool processes it spawns (bash, curl, python, …) are tagged.
#
# Format: one invoked path per line. '#' starts a comment. Blank lines ignored.
#
# Use the path the user actually runs (what `command -v <agent>` prints), NOT
# the resolved interpreter/script — see the README ("Match by path, not inode").
#   command -v claude   # → e.g. /usr/local/bin/claude
#   command -v codex    # → e.g. /usr/local/bin/codex
#
# After editing this file: restart the tagger so it re-reads the allow-list.

/usr/local/bin/claude
#/usr/local/bin/codex
